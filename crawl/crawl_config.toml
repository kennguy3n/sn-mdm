# sn-mdm source registry.
#
# Each [sources.<publisher_id>] section configures one crawler. The
# `publisher_id` must match a class registered in
# `crawl/crawlers/__init__.py::_REGISTRY` — running the pipeline
# raises if a section references an unknown publisher.
#
# Slugs in `episodes` are the per-source path component the crawler
# turns into a fetch URL (see `_episode_url` on each crawler class).
# This list is the **seed set** — concrete crawlers may expand the
# list during `initial_sync` by crawling the source's index page.
#
# Tag families follow the 5-family taxonomy from `docs/SOURCES.md`:
# industry / function / business_model / geography / evidence_type.
#
# Default chunking_policy lives on every section so a per-source
# override is local. Operators bumping the global default should
# also update `DEFAULT_TARGET_TOKENS` / `DEFAULT_OVERLAP_TOKENS`
# in `crawl/crawlers/base.py` and `pack_core::metadata::DEFAULT_CHUNKING`.

# --- Tranche 1: core sources --------------------------------------

