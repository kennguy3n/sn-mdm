name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Single source of truth for the pinned rustc release used by the
# ``rust`` and ``napi-build`` jobs. Promoted to a workflow-level env
# var so the toolchain-install step and the cache key can't drift:
# a one-line bump to ``RUST_TOOLCHAIN`` propagates everywhere. The
# MSRV job pins 1.85.0 separately because it covers the workspace
# floor, not the napi-rs 3.x effective MSRV — see the ``msrv`` job
# comment below.
env:
  RUST_TOOLCHAIN: "1.88.0"

jobs:
  rust:
    name: rust (fmt / clippy / test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned)
        # Pin to a concrete rustc release rather than tracking the
        # ``stable`` channel so a future stable bump can't introduce
        # new clippy lints that break ``-D warnings`` without any
        # code change. ``napi-rs`` 3.x's effective MSRV is 1.88+,
        # so the floor of this pin is whatever lets pack_napi build;
        # bump deliberately when napi-rs / clippy releases warrant
        # it. The MSRV (1.85) signal for the workspace floor lives
        # in the ``msrv`` job below and excludes ``pack_napi`` so
        # the documented MSRV stays meaningful for ``pack_core``
        # and the Python pipeline.
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy,rustfmt
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Include Cargo.lock so a dependency bump (which only
          # touches Cargo.lock, not Cargo.toml) invalidates the
          # cache and rebuilds against the new resolved versions.
          # ``restore-keys`` still lets us reuse the registry / git
          # caches across builds, so the cost is only a recompile
          # of the dependency tree, not a re-download. The toolchain
          # version (sourced from the workflow-level ``RUST_TOOLCHAIN``
          # env var) is part of the cache key so a future rustc bump
          # cleanly invalidates the previous build artefacts — the
          # install step and the cache key cannot drift.
          key: ${{ runner.os }}-cargo-rust-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-rust-${{ env.RUST_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-rust-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all

  msrv:
    name: rust MSRV (1.85.0, excludes pack_napi)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (1.85.0)
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      # ``pack_napi`` deliberately tracks the napi-rs 3.x MSRV
      # (1.88+) rather than the workspace floor — see the
      # ``rust-version`` comment in crates/napi/Cargo.toml.
      # Excluding it here keeps the MSRV signal meaningful for
      # ``pack_core`` and any other future crate that targets the
      # workspace MSRV.
      - name: cargo check --workspace --exclude pack_napi
        run: cargo check --workspace --all-targets --exclude pack_napi

  napi-build:
    name: napi-build (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned)
        # Same pin as the ``rust`` job — see comment there for why
        # we don't track the unpinned ``stable`` channel. Both jobs
        # source the version from the workflow-level
        # ``RUST_TOOLCHAIN`` env var so a future bump is a single
        # edit at the top of the file.
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Use a job-specific key. The ``napi-build`` job builds
          # a ``cdylib`` target (different artefact set, different
          # linker flags via ``napi-build``'s build.rs) than the
          # main ``rust`` job's plain ``cargo test``; a shared key
          # would have one job constantly invalidating the other's
          # ``target/`` contents. ``restore-keys`` still lets the
          # registry / git index warm-start from any sibling job's
          # cache, so dependency downloads stay deduped without
          # forcing repeated full rebuilds of the napi cdylib.
          key: ${{ runner.os }}-cargo-napi-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-napi-${{ env.RUST_TOOLCHAIN }}-
            ${{ runner.os }}-cargo-napi-
            ${{ runner.os }}-cargo-rust-${{ env.RUST_TOOLCHAIN }}-

      - name: cargo test -p pack_napi --lib
        run: cargo test -p pack_napi --lib

      - name: npm install (crates/napi)
        working-directory: crates/napi
        run: npm install --no-fund --no-audit

      - name: napi build (debug, linux-x64-gnu)
        working-directory: crates/napi
        run: npm run build:debug

      - name: node smoke tests
        working-directory: crates/napi
        # ``node --test test/`` walks the directory and runs every
        # file matching the standard test-file pattern. Avoid
        # passing a quoted glob (``'test/*.test.mjs'``) because
        # Node 20's ``--test`` does NOT expand globs internally
        # (that's a Node 22+ feature) and bash leaves the quoted
        # string literal, so Node fails with
        # ``Could not find 'test/*.test.mjs'``.
        run: npm test

  python:
    name: python (ruff / pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crawl/requirements.txt

      - name: ruff check
        working-directory: crawl
        run: ruff check .

      - name: pytest
        run: pytest crawl/tests
